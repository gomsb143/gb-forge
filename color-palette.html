<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Palette — GomathiBalan's Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f8f7f4;--bg-2:#fff;--bg-3:#f0ede8;--bg-4:#e8e3dc;
      --border:#e2ddd6;--border-2:#cdc8bf;
      --ink:#1c1917;--ink-2:#6b6760;--ink-3:#a8a49e;
      --accent:#2563eb;--accent-soft:#eff6ff;
      --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    }
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);overflow-x:hidden}
    .app{display:flex;flex-direction:column;min-height:100vh}

    /* TOPBAR */
    .topbar{height:52px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100}
    .back{font-size:12px;font-weight:500;color:var(--ink-3);text-decoration:none;transition:color .15s}
    .back:hover{color:var(--ink)}
    .sep{width:1px;height:18px;background:var(--border)}
    .ptitle{font-size:13px;font-weight:600;color:var(--ink)}
    .ml{margin-left:auto}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1}
    .btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--bg-3);color:var(--ink)}
    .btn-dark{background:var(--ink);color:#fff}
    .btn-dark:hover{background:#333}
    .btn-sm{padding:4px 9px;font-size:11px}

    /* MAIN */
    .main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}

    /* LEFT — picker */
    .picker-col{width:300px;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
    .picker-col::-webkit-scrollbar{width:3px}
    .picker-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .psec{padding:16px;border-bottom:1px solid var(--border)}
    .plbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px}

    /* Big colour swatch */
    .swatch-big{width:100%;height:120px;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .swatch-big input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}

    /* Colour values */
    .val-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
    .val-box{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;position:relative}
    .val-box:hover{border-color:var(--accent);background:var(--accent-soft)}
    .val-box:active{transform:scale(.97)}
    .val-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
    .val-code{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);margin-top:3px}
    .val-full{grid-column:1/-1}
    .copied-flash{position:absolute;inset:0;background:var(--accent-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);opacity:0;transition:opacity .15s}

    /* Sliders */
    .slider-group{display:flex;flex-direction:column;gap:8px}
    .slider-row{display:flex;align-items:center;gap:8px}
    .slider-label{font-size:11px;font-weight:700;color:var(--ink-3);min-width:12px;font-family:var(--mono)}
    .slider-row input[type=range]{flex:1;-webkit-appearance:none;height:8px;border-radius:8px;outline:none;padding:0;border:none;cursor:pointer}
    .slider-num{font-family:var(--mono);font-size:11px;color:var(--ink-2);min-width:30px;text-align:right}

    /* Hex input */
    .hex-input-row{display:flex;gap:6px;margin-top:8px}
    .hex-input{flex:1;background:var(--bg-3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-family:var(--mono);font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
    .hex-input:focus{border-color:var(--accent);background:var(--bg-2)}

    /* Generator buttons */
    .gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .gen-btn{padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg-3);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;color:var(--ink-2);transition:all .15s;text-align:center}
    .gen-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

    /* Accessibility */
    .contrast-bar{padding:10px;background:var(--bg-3);border-radius:8px;display:flex;flex-direction:column;gap:6px}
    .contrast-row{display:flex;align-items:center;justify-content:space-between}
    .contrast-label{font-size:12px;color:var(--ink-2)}
    .contrast-ratio{font-family:var(--mono);font-size:13px;font-weight:700}
    .wcag-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
    .wcag-aaa{background:#0d2e22;color:#3fb950}
    .wcag-aa{background:#2a1f00;color:#d29922}
    .wcag-fail{background:#2a0e0e;color:#f85149}
    .contrast-preview{border-radius:6px;padding:8px 10px;font-size:13px;font-weight:600;text-align:center;margin-top:4px}

    /* CENTRE — palette */
    .palette-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .palette-header{padding:14px 16px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
    .palette-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
    .palette-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .palette-body::-webkit-scrollbar{width:4px}
    .palette-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}

    /* Palette name input */
    .palette-name-input{font-size:14px;font-weight:700;color:var(--ink);background:transparent;border:none;outline:none;font-family:var(--font);border-bottom:1.5px solid transparent;transition:border-color .15s;padding:2px 4px}
    .palette-name-input:focus{border-color:var(--accent)}

    /* Colour strip */
    .colour-strip{display:flex;height:80px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
    .strip-swatch{flex:1;transition:flex .2s;cursor:pointer;position:relative;min-width:0}
    .strip-swatch:hover{flex:2}
    .strip-swatch-label{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);font-size:10px;font-family:var(--mono);font-weight:500;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none}
    .strip-swatch:hover .strip-swatch-label{opacity:1}

    /* Colour card */
    .colour-card{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;transition:all .15s}
    .colour-card:hover{border-color:var(--border-2);box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .cc-swatch{width:44px;height:44px;border-radius:8px;flex-shrink:0;border:1px solid rgba(0,0,0,.08);cursor:pointer}
    .cc-info{flex:1;min-width:0}
    .cc-hex{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink)}
    .cc-rgb{font-size:11px;color:var(--ink-3);font-family:var(--mono);margin-top:2px}
    .cc-name{font-size:11px;color:var(--ink-2);margin-top:1px}
    .cc-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
    .colour-card:hover .cc-actions{opacity:1}
    .cc-btn{width:26px;height:26px;border-radius:6px;background:var(--bg-3);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink-3);transition:all .15s}
    .cc-btn:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
    .cc-del:hover{background:#fef2f2;color:#dc2626;border-color:#dc2626}

    /* RIGHT — export */
    .export-col{width:260px;background:var(--bg-2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
    .export-col::-webkit-scrollbar{width:3px}
    .export-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    .export-block{background:var(--bg-3);border-radius:8px;padding:10px;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--ink-2);white-space:pre;overflow-x:auto;max-height:180px;overflow-y:auto}
    .export-block::-webkit-scrollbar{width:3px;height:3px}
    .export-block::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}

    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="index.html" class="back">← GomathiBalan's Forge</a>
    <div class="sep"></div>
    <span class="ptitle">🎨 Color Palette Manager</span>
    <div class="ml" style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="exportAll('css')">Export CSS vars</button>
      <button class="btn btn-ghost btn-sm" onclick="exportAll('json')">Export JSON</button>
      <button class="btn btn-dark btn-sm" onclick="addCurrentToPalette()">+ Add to palette</button>
    </div>
  </div>

  <div class="main">

    <!-- PICKER -->
    <div class="picker-col">

      <div class="psec">
        <div class="plbl">Colour Picker</div>
        <div class="swatch-big" id="swatchBig" style="background:#2563eb">
          <input type="color" id="nativePicker" value="#2563eb" oninput="onPickerChange(this.value)"/>
        </div>
        <div class="hex-input-row">
          <input class="hex-input" id="hexInput" type="text" value="#2563eb" placeholder="#000000"
                 oninput="onHexInput(this.value)" maxlength="7"/>
          <button class="btn btn-ghost btn-sm" onclick="randomColour()">🎲</button>
        </div>
        <div class="val-grid" style="margin-top:10px" id="valGrid"></div>
      </div>

      <div class="psec">
        <div class="plbl">RGB Sliders</div>
        <div class="slider-group" id="sliderGroup"></div>
      </div>

      <div class="psec">
        <div class="plbl">Accessibility</div>
        <div class="contrast-bar" id="contrastBar"></div>
      </div>

      <div class="psec">
        <div class="plbl">Generate Palette</div>
        <div class="gen-grid">
          <button class="gen-btn" onclick="generate('shades')">Shades</button>
          <button class="gen-btn" onclick="generate('tints')">Tints</button>
          <button class="gen-btn" onclick="generate('complementary')">Complementary</button>
          <button class="gen-btn" onclick="generate('triadic')">Triadic</button>
          <button class="gen-btn" onclick="generate('analogous')">Analogous</button>
          <button class="gen-btn" onclick="generate('splitcomp')">Split-comp</button>
        </div>
      </div>

    </div>

    <!-- PALETTE -->
    <div class="palette-col">
      <div class="palette-header">
        <input class="palette-name-input" id="paletteName" type="text" value="My Palette" oninput="savePalette()"/>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="clearPalette()">↺ Clear</button>
        </div>
      </div>
      <div class="palette-body" id="paletteBody"></div>
    </div>

    <!-- EXPORT -->
    <div class="export-col">

      <div class="psec">
        <div class="plbl">CSS Variables</div>
        <div class="export-block" id="cssBlock"></div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%" onclick="copyCss()">⎘ Copy CSS</button>
      </div>

      <div class="psec">
        <div class="plbl">Tailwind Config</div>
        <div class="export-block" id="tailwindBlock"></div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%" onclick="copyTailwind()">⎘ Copy Tailwind</button>
      </div>

      <div class="psec">
        <div class="plbl">SCSS Variables</div>
        <div class="export-block" id="scssBlock"></div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%" onclick="copyScss()">⎘ Copy SCSS</button>
      </div>

    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let currentHex = '#2563eb';
let palette = [];

// ── COLOUR MATH ───────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHex(r,g,b) { return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function rgbToHsl(r,g,b) {
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break}
    h/=6;
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function hslToHex(h,s,l) {
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
  return '#'+f(0)+f(8)+f(4);
}
function hexToHsl(hex) { const {r,g,b}=hexToRgb(hex); return rgbToHsl(r,g,b); }
function luminance(hex) {
  const {r,g,b}=hexToRgb(hex);
  const srgb=[r,g,b].map(c=>{c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4)});
  return 0.2126*srgb[0]+0.7152*srgb[1]+0.0722*srgb[2];
}
function contrastRatio(h1,h2) {
  const l1=luminance(h1),l2=luminance(h2);
  return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
}
function isDark(hex) { return luminance(hex) < 0.179; }

// Named colours (approximate CSS)
const CSS_NAMES = {'#ff0000':'red','#00ff00':'lime','#0000ff':'blue','#ffff00':'yellow','#ff00ff':'fuchsia','#00ffff':'cyan','#ffffff':'white','#000000':'black','#808080':'gray','#800000':'maroon','#008000':'green','#000080':'navy','#808000':'olive','#800080':'purple','#008080':'teal','#c0c0c0':'silver','#ffa500':'orange','#ffc0cb':'pink','#a52a2a':'brown'};
function approxName(hex) {
  let best=null,bestD=Infinity;
  const {r:r1,g:g1,b:b1}=hexToRgb(hex);
  Object.entries(CSS_NAMES).forEach(([h,n])=>{
    const {r,g,b}=hexToRgb(h);
    const d=Math.hypot(r-r1,g-g1,b-b1);
    if(d<bestD){bestD=d;best=n;}
  });
  return bestD<80?best:null;
}

// ── UPDATE UI ─────────────────────────────────────────────
function updateAll(hex) {
  currentHex = hex;
  const {r,g,b} = hexToRgb(hex);
  const {h,s,l} = rgbToHsl(r,g,b);
  const textCol = isDark(hex)?'#fff':'#000';

  // Swatch
  $('swatchBig').style.background = hex;
  $('nativePicker').value = hex;
  $('hexInput').value = hex;

  // Value boxes
  const hsl = `hsl(${h}, ${s}%, ${l}%)`;
  const rgb  = `rgb(${r}, ${g}, ${b})`;
  $('valGrid').innerHTML = `
    <div class="val-box val-full" onclick="copyVal('${hex}')">
      <div class="val-label">HEX</div><div class="val-code">${hex.toUpperCase()}</div>
      <div class="copied-flash" id="cf-hex">✓ Copied</div>
    </div>
    <div class="val-box" onclick="copyVal('${rgb}','cf-rgb')">
      <div class="val-label">RGB</div><div class="val-code" style="font-size:11px">${rgb}</div>
      <div class="copied-flash" id="cf-rgb">✓</div>
    </div>
    <div class="val-box" onclick="copyVal('${hsl}','cf-hsl')">
      <div class="val-label">HSL</div><div class="val-code" style="font-size:11px">${hsl}</div>
      <div class="copied-flash" id="cf-hsl">✓</div>
    </div>`;

  // Sliders
  const rTrack = `linear-gradient(to right,#000,rgb(255,${g},${b}))`;
  const gTrack = `linear-gradient(to right,#000,rgb(${r},255,${b}))`;
  const bTrack = `linear-gradient(to right,#000,rgb(${r},${g},255))`;
  $('sliderGroup').innerHTML = `
    ${makeSlider('R','slR',r,rTrack,'#f85149')}
    ${makeSlider('G','slG',g,gTrack,'#3fb950')}
    ${makeSlider('B','slB',b,bTrack,'#388bfd')}`;
  ['R','G','B'].forEach((ch,i)=>{
    const sl = $('sl'+ch);
    sl.style.background = [rTrack,gTrack,bTrack][i];
    sl.oninput = ()=>{
      const rv=parseInt($('slR').value),gv=parseInt($('slG').value),bv=parseInt($('slB').value);
      updateAll(rgbToHex(rv,gv,bv));
    };
  });

  // Contrast
  updateContrast(hex);
}

function makeSlider(label,id,val,track,col) {
  return `<div class="slider-row">
    <span class="slider-label" style="color:${col}">${label}</span>
    <input type="range" id="${id}" min="0" max="255" value="${val}"
      style="background:${track};--thumb:${col}"
      onmousedown="" />
    <span class="slider-num">${val}</span>
  </div>`;
}

function updateContrast(hex) {
  const onWhite = contrastRatio(hex,'#ffffff');
  const onBlack = contrastRatio(hex,'#000000');
  const badge = r => r>=7?'AAA':r>=4.5?'AA':r>=3?'AA Large':'Fail';
  const cls   = r => r>=7?'wcag-aaa':r>=4.5?'wcag-aa':r>=3?'wcag-aa':'wcag-fail';
  const textCol = isDark(hex)?'#ffffff':'#000000';
  $('contrastBar').innerHTML = `
    <div class="contrast-row">
      <span class="contrast-label">On white</span>
      <span class="contrast-ratio">${onWhite.toFixed(2)}:1</span>
      <span class="wcag-badge ${cls(onWhite)}">${badge(onWhite)}</span>
    </div>
    <div class="contrast-row">
      <span class="contrast-label">On black</span>
      <span class="contrast-ratio">${onBlack.toFixed(2)}:1</span>
      <span class="wcag-badge ${cls(onBlack)}">${badge(onBlack)}</span>
    </div>
    <div class="contrast-preview" style="background:${hex};color:${textCol};margin-top:6px">
      Sample text on this colour
    </div>`;
}

// ── EVENTS ────────────────────────────────────────────────
function onPickerChange(hex) { updateAll(hex); }
function onHexInput(val) {
  const h = val.startsWith('#') ? val : '#'+val;
  if (/^#[0-9a-fA-F]{6}$/.test(h)) updateAll(h);
}
function randomColour() {
  const hex = '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');
  updateAll(hex);
}

// ── GENERATORS ────────────────────────────────────────────
function generate(type) {
  const {h,s,l} = hexToHsl(currentHex);
  let colours = [];
  if (type==='shades') colours = [10,20,30,40,50,60,70,80,90].map(ll=>hslToHex(h,s,ll));
  if (type==='tints')  colours = [90,80,70,60,50,40,30,20,10].map(ll=>hslToHex(h,Math.max(s-10,0),ll));
  if (type==='complementary') colours = [currentHex, hslToHex((h+180)%360,s,l)];
  if (type==='triadic')  colours = [0,120,240].map(d=>hslToHex((h+d)%360,s,l));
  if (type==='analogous') colours = [-30,-15,0,15,30].map(d=>hslToHex((h+d+360)%360,s,l));
  if (type==='splitcomp') colours = [0,150,210].map(d=>hslToHex((h+d)%360,s,l));
  colours.forEach(c => { if(!palette.find(p=>p.hex===c)) addColour(c); });
  renderPalette();
  showToast(`✓ ${type.charAt(0).toUpperCase()+type.slice(1)} palette added`);
}

// ── PALETTE ───────────────────────────────────────────────
function addCurrentToPalette() {
  addColour(currentHex);
  renderPalette();
}

function addColour(hex) {
  if (palette.find(p=>p.hex===hex)) return;
  const name = approxName(hex) || hex;
  palette.push({hex, name});
  savePalette();
}

function removeColour(hex) {
  palette = palette.filter(p=>p.hex!==hex);
  renderPalette();
  savePalette();
}

function renderPalette() {
  const body = $('paletteBody');
  if (!palette.length) {
    body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px;opacity:.3">
      <span style="font-size:36px">🎨</span>
      <p style="font-size:13px;color:var(--ink-2);text-align:center">Click "+ Add to palette" or generate colours from the left panel.</p>
    </div>`;
    updateExports(); return;
  }

  // Strip preview
  const strip = `<div class="colour-strip">${palette.map(p=>
    `<div class="strip-swatch" style="background:${p.hex}" onclick="updateAll('${p.hex}')" title="${p.hex}">
      <span class="strip-swatch-label" style="color:${isDark(p.hex)?'#fff':'#000'}">${p.hex}</span>
    </div>`).join('')}</div>`;

  // Cards
  const cards = palette.map(p=>{
    const {r,g,b}=hexToRgb(p.hex);
    return `<div class="colour-card">
      <div class="cc-swatch" style="background:${p.hex}" onclick="updateAll('${p.hex}')" title="Load colour"></div>
      <div class="cc-info">
        <div class="cc-hex">${p.hex.toUpperCase()}</div>
        <div class="cc-rgb">rgb(${r},${g},${b})</div>
        ${p.name&&p.name!==p.hex?`<div class="cc-name">${p.name}</div>`:''}
      </div>
      <div class="cc-actions">
        <button class="cc-btn" onclick="copyVal('${p.hex}')" title="Copy HEX">⎘</button>
        <button class="cc-btn cc-del" onclick="removeColour('${p.hex}')" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');

  body.innerHTML = strip + '<div style="display:flex;flex-direction:column;gap:6px;margin-top:12px">' + cards + '</div>';
  updateExports();
}

function clearPalette() {
  if (palette.length && !confirm('Clear entire palette?')) return;
  palette=[]; renderPalette(); savePalette();
}

// ── EXPORTS ───────────────────────────────────────────────
function updateExports() {
  const css = ':root {\n' + palette.map((p,i)=>`  --color-${i+1}: ${p.hex};`).join('\n') + '\n}';
  const tailwind = 'colors: {\n' + palette.map((p,i)=>`  'custom-${i+1}': '${p.hex}',`).join('\n') + '\n}';
  const scss = palette.map((p,i)=>`$color-${i+1}: ${p.hex};`).join('\n');
  $('cssBlock').textContent = css;
  $('tailwindBlock').textContent = tailwind;
  $('scssBlock').textContent = scss;
}
function copyCss()      { navigator.clipboard.writeText($('cssBlock').textContent).then(()=>showToast('✓ CSS copied')); }
function copyTailwind() { navigator.clipboard.writeText($('tailwindBlock').textContent).then(()=>showToast('✓ Tailwind config copied')); }
function copyScss()     { navigator.clipboard.writeText($('scssBlock').textContent).then(()=>showToast('✓ SCSS copied')); }

function exportAll(fmt) {
  if (!palette.length) { showToast('⚠ Palette is empty'); return; }
  let content, filename, mime;
  if (fmt==='css') { content=$('cssBlock').textContent; filename='palette.css'; mime='text/css'; }
  else { content=JSON.stringify(palette.map(p=>({hex:p.hex,name:p.name})),null,2); filename='palette.json'; mime='application/json'; }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime})); a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('✓ Downloaded '+filename);
}

// ── COPY ──────────────────────────────────────────────────
function copyVal(val, flashId) {
  navigator.clipboard.writeText(val).then(()=>{
    showToast('✓ Copied '+val);
    if (flashId) {
      const el=$(flashId); if(el){el.style.opacity='1';setTimeout(()=>el.style.opacity='0',800);}
    }
  });
}

// ── PERSIST ───────────────────────────────────────────────
function savePalette() {
  try { localStorage.setItem('teamkit_palette', JSON.stringify({name:$('paletteName').value,palette})); } catch {}
}
function loadPalette() {
  try {
    const d=JSON.parse(localStorage.getItem('teamkit_palette')||'{}');
    if(d.name) $('paletteName').value=d.name;
    if(d.palette) { palette=d.palette; renderPalette(); }
  } catch {}
}

// ── UTILS ─────────────────────────────────────────────────
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// ── INIT ──────────────────────────────────────────────────
updateAll('#2563eb');
loadPalette();
</script>
