<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Linter — GomathiBalan's Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f8f7f4;--bg-2:#fff;--bg-3:#f0ede8;--bg-4:#e8e3dc;
      --border:#e2ddd6;--border-2:#cdc8bf;
      --ink:#1c1917;--ink-2:#6b6760;--ink-3:#a8a49e;
      --accent:#2563eb;--accent-soft:#eff6ff;
      --err:#dc2626;--err-bg:#fef2f2;--err-border:#fca5a5;
      --warn:#d97706;--warn-bg:#fffbeb;--warn-border:#fcd34d;
      --info:#2563eb;--info-bg:#eff6ff;--info-border:#93c5fd;
      --ok:#16a34a;--ok-bg:#f0fdf4;--ok-border:#86efac;
      --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    }
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);overflow:hidden}
    .app{display:flex;flex-direction:column;height:100vh}
    .topbar{height:52px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
    .back{font-size:12px;font-weight:500;color:var(--ink-3);text-decoration:none}
    .back:hover{color:var(--ink)}
    .sep{width:1px;height:18px;background:var(--border)}
    .ptitle{font-size:13px;font-weight:600}
    .ml{margin-left:auto}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1}
    .btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--bg-3);color:var(--ink)}
    .btn-ghost.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
    .btn-sm{padding:4px 9px;font-size:11px}
    .body{display:flex;flex:1;overflow:hidden}

    /* EDITOR */
    .editor-col{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
    .col-header{height:36px;background:var(--bg-3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}
    .col-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
    .editor-area{flex:1;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.75;background:var(--bg-2);border:none;outline:none;resize:none;color:var(--ink);tab-size:2;overflow-y:auto}
    .editor-area::-webkit-scrollbar{width:4px}
    .editor-area::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
    .editor-area::placeholder{color:var(--ink-3);font-family:var(--font)}

    /* RESULTS */
    .results-col{width:420px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
    .results-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
    .results-body::-webkit-scrollbar{width:4px}
    .results-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}

    /* Summary bar */
    .summary-bar{padding:10px 14px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-shrink:0;flex-wrap:wrap}
    .sum-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
    .sum-err {background:var(--err-bg); color:var(--err)}
    .sum-warn{background:var(--warn-bg);color:var(--warn)}
    .sum-info{background:var(--info-bg);color:var(--info)}
    .sum-ok  {background:var(--ok-bg);  color:var(--ok)}

    /* Issue card */
    .issue-card{border-radius:9px;border:1px solid;padding:10px 12px;display:flex;flex-direction:column;gap:4px}
    .ic-err {background:var(--err-bg); border-color:var(--err-border)}
    .ic-warn{background:var(--warn-bg);border-color:var(--warn-border)}
    .ic-info{background:var(--info-bg);border-color:var(--info-border)}
    .ic-header{display:flex;align-items:center;gap:8px}
    .ic-sev{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px}
    .sev-error  {background:var(--err);  color:#fff}
    .sev-warning{background:var(--warn); color:#fff}
    .sev-info   {background:var(--info); color:#fff}
    .ic-rule{font-size:11px;font-weight:600;color:var(--ink-2);font-family:var(--mono)}
    .ic-line{font-size:11px;color:var(--ink-3);margin-left:auto;font-family:var(--mono);cursor:pointer;text-decoration:underline dotted}
    .ic-line:hover{color:var(--accent)}
    .ic-msg{font-size:13px;color:var(--ink);line-height:1.4}
    .ic-fix{font-size:11px;color:var(--ink-3);font-style:italic;margin-top:2px}
    .ic-code{font-family:var(--mono);font-size:11px;background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;color:var(--ink-2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

    /* OK state */
    .ok-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;opacity:.4}
    .ok-state .oi{font-size:40px}
    .ok-state p{font-size:13px;color:var(--ink-2);text-align:center}

    /* Rule toggles */
    .rules-panel{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
    .rules-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
    .rules-grid{display:flex;flex-wrap:wrap;gap:4px}
    .rule-tog{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg-3);cursor:pointer;color:var(--ink-3);transition:all .15s}
    .rule-tog.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}

    .upload-zone{border:2px dashed var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .18s;margin:8px 0}
    .upload-zone:hover{border-color:var(--accent);background:var(--accent-soft)}
    .upload-zone p{font-size:11px;color:var(--ink-3)}

    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="index.html" class="back">← GomathiBalan's Forge</a>
    <div class="sep"></div>
    <span class="ptitle">📋 Markdown Linter</span>
    <div class="ml" style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="loadSample()">Load sample</button>
      <button class="btn btn-ghost btn-sm" onclick="clearAll()">↺ Clear</button>
      <button class="btn btn-ghost btn-sm" onclick="copyReport()">⎘ Copy report</button>
    </div>
  </div>
  <div class="body">
    <div class="editor-col">
      <div class="col-header">
        <span class="col-label">Markdown Input</span>
        <div style="margin-left:auto">
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">
            📁 Upload .md
            <input type="file" accept=".md,.txt" style="display:none" onchange="uploadFile(this)"/>
          </label>
        </div>
      </div>
      <textarea class="editor-area" id="mdInput" placeholder="Paste your markdown here…" oninput="lint()" spellcheck="false"></textarea>
    </div>
    <div class="results-col">
      <div class="summary-bar" id="summaryBar">
        <span style="font-size:12px;color:var(--ink-3)">Paste markdown to start linting</span>
      </div>
      <div class="results-body" id="resultsBody">
        <div class="ok-state"><div class="oi">📋</div><p>Paste markdown on the left<br/>to see lint results here.</p></div>
      </div>
      <div class="rules-panel">
        <div class="rules-title">Rules</div>
        <div class="rules-grid" id="rulesGrid"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const $ = id => document.getElementById(id);

// ── RULES ─────────────────────────────────────────────────
const RULES = [
  {id:'no-multiple-h1',  label:'One H1',      sev:'error',   desc:'Multiple H1 headings'},
  {id:'heading-order',   label:'Heading order',sev:'error',   desc:'Skipped heading levels (e.g. H1→H3)'},
  {id:'no-empty-heading',label:'Empty heading',sev:'error',   desc:'Heading with no text'},
  {id:'no-dup-heading',  label:'Dup headings', sev:'warning', desc:'Duplicate heading text'},
  {id:'missing-h1',      label:'Missing H1',   sev:'warning', desc:'Document has no H1'},
  {id:'no-bare-url',     label:'Bare URLs',     sev:'warning', desc:'URL not wrapped in a link'},
  {id:'no-broken-link',  label:'Broken links', sev:'warning', desc:'Link with empty href or mailto issue'},
  {id:'img-alt',         label:'Image alt',    sev:'warning', desc:'Image missing alt text'},
  {id:'no-trailing-space',label:'Trailing sp', sev:'info',    desc:'Lines with trailing whitespace'},
  {id:'line-length',     label:'Long lines',   sev:'info',    desc:'Lines over 120 chars'},
  {id:'no-hard-tab',     label:'No tabs',      sev:'info',    desc:'Hard tab characters'},
  {id:'fenced-lang',     label:'Code lang',    sev:'info',    desc:'Fenced code block missing language'},
  {id:'no-consec-blank', label:'Blank lines',  sev:'info',    desc:'More than 2 consecutive blank lines'},
];

let enabledRules = new Set(RULES.map(r=>r.id));
let lastIssues = [];

function buildRulesGrid() {
  $('rulesGrid').innerHTML = RULES.map(r =>
    `<button class="rule-tog on" id="rt-${r.id}" onclick="toggleRule('${r.id}')">${r.label}</button>`
  ).join('');
}

function toggleRule(id) {
  if (enabledRules.has(id)) enabledRules.delete(id);
  else enabledRules.add(id);
  $('rt-'+id).classList.toggle('on', enabledRules.has(id));
  lint();
}

// ── LINTER ────────────────────────────────────────────────
function lint() {
  const src = $('mdInput').value;
  if (!src.trim()) { showEmpty(); return; }
  const lines = src.split('\n');
  const issues = [];

  const add = (ruleId, sev, line, msg, fix, code) => {
    const rule = RULES.find(r=>r.id===ruleId);
    if (!rule || !enabledRules.has(ruleId)) return;
    issues.push({ruleId, sev, line, msg, fix, code});
  };

  // ── Heading tracking ──
  const headings = [];
  let h1Count = 0;
  let seenHeadings = new Set();
  let prevLevel = 0;

  // ── State ──
  let inCode = false;
  let blankRun = 0;

  lines.forEach((rawLine, i) => {
    const ln = i + 1;
    const line = rawLine;

    // Toggle code fence
    if (/^```/.test(line)) { inCode = !inCode; }

    // ── Fenced code language ──
    if (enabledRules.has('fenced-lang') && /^```\s*$/.test(line)) {
      add('fenced-lang','info',ln,'Fenced code block missing language tag','Add language: ```js, ```python etc.',line);
    }

    if (inCode) return; // skip checks inside code blocks

    // ── Blank line runs ──
    if (line.trim() === '') { blankRun++; }
    else { blankRun = 0; }
    if (enabledRules.has('no-consec-blank') && blankRun > 2) {
      add('no-consec-blank','info',ln,'More than 2 consecutive blank lines','Remove extra blank lines',null);
    }

    // ── Headings ──
    const hMatch = line.match(/^(#{1,6})\s*(.*)/);
    if (hMatch) {
      const level = hMatch[1].length;
      const text  = hMatch[2].trim();

      if (enabledRules.has('no-empty-heading') && !text) {
        add('no-empty-heading','error',ln,'Empty heading — no text after #','Add heading text',line);
      }

      if (level === 1) h1Count++;

      if (enabledRules.has('heading-order') && prevLevel > 0 && level > prevLevel + 1) {
        add('heading-order','error',ln,
          `Heading level skipped: H${prevLevel} → H${level} (missing H${prevLevel+1})`,
          `Change to H${prevLevel+1} or add an H${prevLevel+1} before this`,line);
      }

      if (enabledRules.has('no-dup-heading') && seenHeadings.has(text.toLowerCase())) {
        add('no-dup-heading','warning',ln,`Duplicate heading: "${text}"`,
          'Rename heading to be unique',line);
      }
      seenHeadings.add(text.toLowerCase());
      headings.push({level,text,ln});
      prevLevel = level;
    }

    // ── Trailing whitespace ──
    if (enabledRules.has('no-trailing-space') && /\s+$/.test(line) && line.trim() !== '') {
      add('no-trailing-space','info',ln,'Trailing whitespace','Remove trailing spaces',null);
    }

    // ── Long lines ──
    if (enabledRules.has('line-length') && line.length > 120 && !line.match(/^[\|]/)) {
      add('line-length','info',ln,`Line is ${line.length} characters (limit: 120)`,
        'Break into multiple lines or shorten',line.slice(0,60)+'…');
    }

    // ── Hard tabs ──
    if (enabledRules.has('no-hard-tab') && line.includes('\t')) {
      add('no-hard-tab','info',ln,'Hard tab character found','Replace tabs with spaces',null);
    }

    // ── Bare URLs ──
    if (enabledRules.has('no-bare-url')) {
      const bareUrls = [...line.matchAll(/(?<![(\["])https?:\/\/[^\s)>\]"]+/g)];
      bareUrls.forEach(m => {
        add('no-bare-url','warning',ln,`Bare URL: ${m[0].slice(0,50)}`,
          'Wrap in link: [text](url)',m[0].slice(0,60));
      });
    }

    // ── Links ──
    const links = [...line.matchAll(/\[([^\]]*)\]\(([^)]*)\)/g)];
    links.forEach(([,text,href]) => {
      if (enabledRules.has('no-broken-link') && !href.trim()) {
        add('no-broken-link','warning',ln,`Link "${text}" has empty href`,
          'Add a valid URL or anchor target',`[${text}](...)`);
      }
    });

    // ── Images ──
    const imgs = [...line.matchAll(/!\[([^\]]*)\]\([^)]+\)/g)];
    imgs.forEach(([full,alt]) => {
      if (enabledRules.has('img-alt') && !alt.trim()) {
        add('img-alt','warning',ln,'Image missing alt text',
          'Add descriptive alt: ![description](url)',full.slice(0,50));
      }
    });
  });

  // ── Post-scan checks ──
  if (enabledRules.has('missing-h1') && h1Count === 0 && lines.some(l=>l.trim())) {
    add('missing-h1','warning',1,'Document has no H1 heading',
      'Add an H1 at the top: # Title',null);
  }
  if (enabledRules.has('no-multiple-h1') && h1Count > 1) {
    const h1Lines = headings.filter(h=>h.level===1).map(h=>h.ln).join(', ');
    add('no-multiple-h1','error',headings.find(h=>h.level===1)?.ln||1,
      `${h1Count} H1 headings found (lines ${h1Lines}) — should have exactly one`,
      'Keep only one H1 as the document title',null);
  }

  lastIssues = issues;
  renderResults(issues);
}

function renderResults(issues) {
  const errs  = issues.filter(i=>i.sev==='error').length;
  const warns = issues.filter(i=>i.sev==='warning').length;
  const infos = issues.filter(i=>i.sev==='info').length;

  // Summary
  $('summaryBar').innerHTML = issues.length === 0
    ? `<span class="sum-pill sum-ok">✓ No issues found</span>`
    : `${errs?`<span class="sum-pill sum-err">✕ ${errs} error${errs!==1?'s':''}</span>`:''}
       ${warns?`<span class="sum-pill sum-warn">⚠ ${warns} warning${warns!==1?'s':''}</span>`:''}
       ${infos?`<span class="sum-pill sum-info">ℹ ${infos} info</span>`:''}`;

  if (!issues.length) {
    $('resultsBody').innerHTML = '<div class="ok-state"><div class="oi">✅</div><p>No issues found!<br/>Your markdown looks clean.</p></div>';
    return;
  }

  $('resultsBody').innerHTML = issues.map(issue => `
    <div class="issue-card ic-${issue.sev.slice(0,4)}">
      <div class="ic-header">
        <span class="ic-sev sev-${issue.sev}">${issue.sev}</span>
        <span class="ic-rule">${issue.ruleId}</span>
        ${issue.line ? `<span class="ic-line" onclick="goToLine(${issue.line})" title="Jump to line">Line ${issue.line}</span>` : ''}
      </div>
      <div class="ic-msg">${escHtml(issue.msg)}</div>
      ${issue.fix  ? `<div class="ic-fix">💡 ${escHtml(issue.fix)}</div>` : ''}
      ${issue.code ? `<div class="ic-code">${escHtml(issue.code)}</div>` : ''}
    </div>`).join('');
}

function goToLine(ln) {
  const ta = $('mdInput');
  const lines = ta.value.split('\n');
  let pos = 0;
  for (let i=0;i<ln-1&&i<lines.length;i++) pos+=lines[i].length+1;
  ta.focus(); ta.setSelectionRange(pos,pos+lines[ln-1].length);
  // Scroll to line
  const lineH = ta.scrollHeight / lines.length;
  ta.scrollTop = (ln-1)*lineH - ta.clientHeight/2;
}

function showEmpty() {
  $('summaryBar').innerHTML = '<span style="font-size:12px;color:var(--ink-3)">Paste markdown to start linting</span>';
  $('resultsBody').innerHTML = '<div class="ok-state"><div class="oi">📋</div><p>Paste markdown on the left<br/>to see lint results here.</p></div>';
}

function copyReport() {
  if (!lastIssues.length) { showToast('⚠ No issues to report'); return; }
  const text = lastIssues.map(i=>`[${i.sev.toUpperCase()}] Line ${i.line||'?'} (${i.ruleId}): ${i.msg}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast('✓ Report copied'));
}

function uploadFile(input) {
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => { $('mdInput').value=e.target.result; lint(); };
  r.readAsText(file); input.value='';
}

function loadSample() {
  $('mdInput').value = `# Project README

## Introduction
This project helps teams collaborate on documentation.

#### Setup (skipped H3!)
To get started, clone the repository.

## Installation

1. Install dependencies
2. Configure environment

## Usage

Check out https://example.com for more info.

### API Reference

#### Endpoints

- GET /users
- POST /users  

### Images

![](./screenshot.png)

Here is a bare url: https://example.com/api/v2/endpoint

### Links

Click [here]() for details.

## Duplicate Section

Some content here.

## Duplicate Section

More content.

\`\`\`
// missing language tag
const x = 1;
\`\`\`
`;
  lint();
}

function clearAll() { $('mdInput').value=''; showEmpty(); lastIssues=[]; }

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

buildRulesGrid();
</script>

<!-- ── TEAMKIT FOOTER ── -->
<div style="
  border-top:1px solid #e6e1da;
  background:#f0ede8;
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  flex-shrink:0;
" id="tk-footer">
  <span style="color:#a8a49e">
    🧰 <strong style="color:#6b6760">GomathiBalan's Forge</strong> &nbsp;·&nbsp;
    Built by <strong style="color:#1c1917">GomathiBalan</strong>
  </span>
  <span style="color:#c4bfb8;font-size:10px">
    Designed with prompts &nbsp;·&nbsp; Crafted by 
    <strong style="color:#a8a49e">Claude AI</strong>
  </span>
</div>
</body>
</html>
