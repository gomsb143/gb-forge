<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Previewer — GomathiBalan's Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #f8f7f4; --bg-2: #ffffff; --bg-3: #f0ede8; --bg-4: #e8e3dc;
      --border: #e2ddd6; --border-2: #cdc8bf;
      --ink:    #1c1917; --ink-2: #6b6760; --ink-3: #a8a49e;
      --accent: #2563eb; --accent-soft: #eff6ff;
      --green:  #16a34a; --green-soft: #f0fdf4;
      --red:    #dc2626;
      --font:   'DM Sans', sans-serif;
      --mono:   'DM Mono', monospace;
      --serif:  'DM Serif Display', serif;
    }

    /* ── PRINT ── */
    @media print {
      html,body,.app { height:auto!important; overflow:visible!important; }
      body { background:#fff!important; }
      .topbar, .editor-col, .toolbar, .print-hide { display:none!important; }
      .body { display:block!important; }
      .preview-col { width:100%!important; border:none!important; padding:0!important; overflow:visible!important; height:auto!important; }
      .preview-inner { padding:0!important; }
    }

    html, body { height:100%; font-family:var(--font); background:var(--bg); color:var(--ink); overflow:hidden; }
    .app { display:flex; flex-direction:column; height:100vh; }

    /* TOPBAR */
    .topbar { height:52px; background:var(--bg-2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 16px; flex-shrink:0; z-index:100; gap:8px; }
    .tl { display:flex; align-items:center; gap:12px; min-width:0; }
    .tr { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .back { font-size:12px; font-weight:500; color:var(--ink-3); text-decoration:none; transition:color .15s; white-space:nowrap; }
    .back:hover { color:var(--ink); }
    .tsep { width:1px; height:18px; background:var(--border); flex-shrink:0; }
    .ptitle { font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; }
    .doc-title-input { font-size:13px; font-weight:600; color:var(--ink); background:transparent; border:none; outline:none; font-family:var(--font); min-width:120px; max-width:280px; border-bottom:1.5px solid transparent; transition:border-color .15s; padding:2px 4px; }
    .doc-title-input:focus { border-color:var(--accent); background:var(--accent-soft); border-radius:4px; }
    .btn { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:7px; font-family:var(--font); font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all .15s; white-space:nowrap; line-height:1; }
    .btn-ghost { background:transparent; color:var(--ink-2); border:1px solid var(--border); }
    .btn-ghost:hover { background:var(--bg-3); color:var(--ink); border-color:var(--border-2); }
    .btn-ghost.active { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
    .btn-dark  { background:var(--ink); color:#fff; }
    .btn-dark:hover  { background:#333; }
    .btn-sm { padding:5px 10px; font-size:11px; }

    /* VIEW TOGGLE */
    .view-seg { display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; background:var(--bg-3); }
    .view-btn { padding:5px 10px; font-family:var(--font); font-size:11px; font-weight:600; border:none; background:transparent; cursor:pointer; color:var(--ink-2); transition:all .15s; display:flex; align-items:center; gap:4px; }
    .view-btn.on { background:var(--bg-2); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.08); }

    /* BODY */
    .body { display:flex; flex:1; overflow:hidden; }

    /* TOOLBAR */
    .toolbar { width:44px; background:var(--bg-2); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:4px; flex-shrink:0; overflow-y:auto; }
    .toolbar::-webkit-scrollbar { display:none; }
    .tb-btn { width:32px; height:32px; border-radius:7px; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--ink-2); transition:all .15s; font-family:var(--mono); font-weight:500; }
    .tb-btn:hover { background:var(--bg-3); color:var(--ink); }
    .tb-sep { width:20px; height:1px; background:var(--border); margin:4px 0; }

    /* EDITOR */
    .editor-col { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; border-right:1px solid var(--border); }
    .editor-header { height:36px; background:var(--bg-3); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0; }
    .editor-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); }
    .word-count   { font-size:10px; color:var(--ink-3); margin-left:auto; }
    .editor-textarea { flex:1; resize:none; border:none; outline:none; padding:20px; font-family:var(--mono); font-size:13px; line-height:1.75; color:var(--ink); background:var(--bg-2); tab-size:2; }
    .editor-textarea::placeholder { color:var(--ink-3); }
    .editor-textarea::-webkit-scrollbar { width:4px; }
    .editor-textarea::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    /* PREVIEW */
    .preview-col { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; background:var(--bg-2); }
    .preview-header { height:36px; background:var(--bg-3); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; flex-shrink:0; }
    .preview-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); }
    .preview-inner { flex:1; overflow-y:auto; padding:28px 36px; }
    .preview-inner::-webkit-scrollbar { width:4px; }
    .preview-inner::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    /* Full preview mode */
    .body.view-preview .editor-col  { display:none; }
    .body.view-preview .toolbar      { display:none; }
    .body.view-editor  .preview-col  { display:none; }

    /* ── RENDERED MARKDOWN STYLES ── */
    .md-body { font-family:var(--font); font-size:14px; line-height:1.8; color:var(--ink); max-width:720px; }
    .md-body h1 { font-family:var(--serif); font-size:2em; font-weight:400; color:var(--ink); margin:0 0 .5em; line-height:1.2; border-bottom:2px solid var(--border); padding-bottom:.3em; }
    .md-body h2 { font-family:var(--serif); font-size:1.5em; font-weight:400; color:var(--ink); margin:1.4em 0 .4em; line-height:1.2; border-bottom:1px solid var(--border); padding-bottom:.25em; }
    .md-body h3 { font-size:1.15em; font-weight:700; color:var(--ink); margin:1.2em 0 .3em; }
    .md-body h4 { font-size:1em; font-weight:700; color:var(--ink-2); margin:1em 0 .2em; }
    .md-body h5 { font-size:.9em; font-weight:700; color:var(--ink-2); margin:1em 0 .2em; text-transform:uppercase; letter-spacing:.06em; }
    .md-body h6 { font-size:.85em; font-weight:600; color:var(--ink-3); margin:1em 0 .2em; }
    .md-body p  { margin:.7em 0; }
    .md-body a  { color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(37,99,235,.3); transition:border-color .15s; }
    .md-body a:hover { border-color:var(--accent); }
    .md-body strong { font-weight:700; color:var(--ink); }
    .md-body em     { font-style:italic; }
    .md-body del    { text-decoration:line-through; color:var(--ink-3); }
    .md-body ul, .md-body ol { margin:.6em 0 .6em 1.6em; }
    .md-body li     { margin:.25em 0; }
    .md-body li > ul, .md-body li > ol { margin:.2em 0 .2em 1.2em; }
    /* Task list */
    .md-body input[type=checkbox] { accent-color:var(--accent); margin-right:.5em; cursor:default; }
    .md-body blockquote { border-left:3px solid var(--accent); margin:.8em 0; padding:.5em 1em; background:var(--accent-soft); border-radius:0 6px 6px 0; color:var(--ink-2); font-style:italic; }
    .md-body blockquote p { margin:0; }
    /* Inline code */
    .md-body code { font-family:var(--mono); font-size:.88em; background:var(--bg-3); color:var(--red); padding:.15em .4em; border-radius:4px; border:1px solid var(--border); }
    /* Code blocks */
    .md-body pre  { background:var(--ink); border-radius:10px; padding:16px 20px; margin:.8em 0; overflow-x:auto; }
    .md-body pre::-webkit-scrollbar { height:3px; }
    .md-body pre::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }
    .md-body pre code { background:transparent; color:#e8eaf0; border:none; padding:0; font-size:.88em; line-height:1.6; }
    /* Tables */
    .md-body table { border-collapse:collapse; width:100%; margin:.8em 0; font-size:.9em; }
    .md-body th { background:var(--bg-3); font-weight:700; text-align:left; padding:.5em .8em; border:1px solid var(--border); }
    .md-body td { padding:.45em .8em; border:1px solid var(--border); }
    .md-body tr:nth-child(even) td { background:var(--bg); }
    /* HR */
    .md-body hr { border:none; border-top:2px solid var(--border); margin:1.5em 0; }
    /* Images */
    .md-body img { max-width:100%; border-radius:8px; margin:.4em 0; }
    /* Footnotes, definition lists etc */
    .md-body mark { background:#fef08a; padding:.05em .2em; border-radius:3px; }

    /* SYNTAX HIGHLIGHT (simple token colouring) */
    .tok-kw      { color:#f472b6; }
    .tok-str     { color:#86efac; }
    .tok-num     { color:#fca5a5; }
    .tok-comment { color:#6b7280; font-style:italic; }
    .tok-fn      { color:#93c5fd; }

    /* Toast */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; opacity:0; transition:all .25s; pointer-events:none; z-index:999; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Scroll sync indicator */
    .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); margin-left:auto; opacity:.6; }
    .sync-dot.off { background:var(--border-2); }
  </style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tl">
      <a href="index.html" class="back">← GomathiBalan's Forge</a>
      <div class="tsep"></div>
      <input class="doc-title-input" id="docTitle" type="text" value="Untitled Document" spellcheck="false" oninput="saveDoc()"/>
    </div>
    <div class="tr print-hide">
      <!-- View toggle -->
      <div class="view-seg">
        <button class="view-btn" id="vEditor"  onclick="setView('editor')">✏️ Edit</button>
        <button class="view-btn on" id="vSplit" onclick="setView('split')">⊞ Split</button>
        <button class="view-btn" id="vPreview" onclick="setView('preview')">👁 Preview</button>
      </div>
      <div class="tsep"></div>
      <!-- Sync scroll -->
      <button class="btn btn-ghost btn-sm" id="syncBtn" onclick="toggleSync()" title="Sync scroll">⇅ Sync</button>
      <!-- Export -->
      <button class="btn btn-ghost btn-sm" onclick="copyMd()">⎘ Copy MD</button>
      <button class="btn btn-ghost btn-sm" onclick="copyHtml()">⎘ Copy HTML</button>
      <button class="btn btn-ghost btn-sm" onclick="downloadMd()">⬇ .md</button>
      <button class="btn btn-dark  btn-sm" onclick="downloadPDF()">⬇ PDF</button>
    </div>
  </div>

  <div class="body" id="mainBody">

    <!-- TOOLBAR -->
    <div class="toolbar print-hide" id="toolbar">
      <button class="tb-btn" onclick="wrap('**','**')"        title="Bold"><b>B</b></button>
      <button class="tb-btn" onclick="wrap('*','*')"          title="Italic"><i>I</i></button>
      <button class="tb-btn" onclick="wrap('~~','~~')"        title="Strikethrough"><s>S</s></button>
      <button class="tb-btn" onclick="wrap('`','`')"          title="Inline code" style="font-size:12px">`c`</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="insertLine('# ')"       title="Heading 1" style="font-size:11px;font-weight:700">H1</button>
      <button class="tb-btn" onclick="insertLine('## ')"      title="Heading 2" style="font-size:11px;font-weight:700">H2</button>
      <button class="tb-btn" onclick="insertLine('### ')"     title="Heading 3" style="font-size:11px;font-weight:700">H3</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="insertLine('- ')"       title="Bullet list">•</button>
      <button class="tb-btn" onclick="insertLine('1. ')"      title="Numbered list" style="font-size:11px">1.</button>
      <button class="tb-btn" onclick="insertLine('- [ ] ')"   title="Task list" style="font-size:11px">☐</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="insertLine('> ')"       title="Blockquote">"</button>
      <button class="tb-btn" onclick="insertCodeBlock()"      title="Code block" style="font-size:11px">{}</button>
      <button class="tb-btn" onclick="insertLine('---')"      title="Horizontal rule">—</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="insertLink()"           title="Link" style="font-size:12px">🔗</button>
      <button class="tb-btn" onclick="insertImage()"          title="Image" style="font-size:12px">🖼</button>
      <button class="tb-btn" onclick="insertTable()"          title="Table" style="font-size:12px">⊞</button>
    </div>

    <!-- EDITOR -->
    <div class="editor-col" id="editorCol">
      <div class="editor-header">
        <span class="editor-label">Markdown</span>
        <span class="word-count" id="wordCount">0 words</span>
      </div>
      <textarea class="editor-textarea" id="editor"
        placeholder="Start writing markdown here…

# Hello World
Write **bold**, *italic*, or `code`.
- List item one
- List item two

> Blockquote text

```js
const hello = 'world';
```"
        oninput="onEdit()" onscroll="onEditorScroll()" spellcheck="false"></textarea>
    </div>

    <!-- PREVIEW -->
    <div class="preview-col" id="previewCol">
      <div class="preview-header">
        <span class="preview-label">Preview</span>
        <div class="sync-dot" id="syncDot" title="Scroll sync"></div>
      </div>
      <div class="preview-inner" id="previewPane" onscroll="onPreviewScroll()">
        <div class="md-body" id="mdBody"></div>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────
let syncScroll = true;
let isSyncingScroll = false;
let view = 'split';

const $ = id => document.getElementById(id);
const editor = $('editor');

// ── PERSIST ───────────────────────────────────────────────
function saveDoc() {
  try {
    localStorage.setItem('teamkit_md', JSON.stringify({
      title: $('docTitle').value,
      content: editor.value,
    }));
  } catch {}
}
function loadDoc() {
  try {
    const r = localStorage.getItem('teamkit_md');
    if (!r) return;
    const d = JSON.parse(r);
    $('docTitle').value = d.title || 'Untitled Document';
    editor.value = d.content || '';
  } catch {}
}

// ── VIEW ──────────────────────────────────────────────────
function setView(v) {
  view = v;
  ['editor','split','preview'].forEach(k => {
    $('v' + k.charAt(0).toUpperCase() + k.slice(1)).classList.toggle('on', k === v);
  });
  const body = $('mainBody');
  body.classList.remove('view-editor','view-split','view-preview');
  body.classList.add('view-' + v);
  $('toolbar').style.display = v === 'preview' ? 'none' : '';
}

function toggleSync() {
  syncScroll = !syncScroll;
  $('syncBtn').classList.toggle('active', syncScroll);
  $('syncDot').classList.toggle('off', !syncScroll);
}

// ── SCROLL SYNC ───────────────────────────────────────────
function onEditorScroll() {
  if (!syncScroll || isSyncingScroll || view !== 'split') return;
  isSyncingScroll = true;
  const ed = editor;
  const pct = ed.scrollTop / (ed.scrollHeight - ed.clientHeight);
  const pane = $('previewPane');
  pane.scrollTop = pct * (pane.scrollHeight - pane.clientHeight);
  requestAnimationFrame(() => { isSyncingScroll = false; });
}
function onPreviewScroll() {
  if (!syncScroll || isSyncingScroll || view !== 'split') return;
  isSyncingScroll = true;
  const pane = $('previewPane');
  const pct = pane.scrollTop / (pane.scrollHeight - pane.clientHeight);
  editor.scrollTop = pct * (editor.scrollHeight - editor.clientHeight);
  requestAnimationFrame(() => { isSyncingScroll = false; });
}

// ── EDITOR HELPERS ────────────────────────────────────────
function wrap(before, after) {
  const start = editor.selectionStart;
  const end   = editor.selectionEnd;
  const sel   = editor.value.slice(start, end);
  const text  = before + (sel || 'text') + after;
  editor.setRangeText(text, start, end, 'select');
  if (!sel) {
    editor.selectionStart = start + before.length;
    editor.selectionEnd   = start + before.length + 4;
  }
  editor.focus();
  onEdit();
}

function insertLine(prefix) {
  const start = editor.selectionStart;
  const val   = editor.value;
  // Find start of current line
  const lineStart = val.lastIndexOf('\n', start - 1) + 1;
  const lineEnd   = val.indexOf('\n', start);
  const line      = val.slice(lineStart, lineEnd === -1 ? undefined : lineEnd);
  // If line already starts with prefix, remove it (toggle)
  if (line.startsWith(prefix)) {
    editor.setRangeText('', lineStart, lineStart + prefix.length, 'end');
  } else {
    editor.setRangeText(prefix, lineStart, lineStart, 'end');
  }
  editor.focus();
  onEdit();
}

function insertCodeBlock() {
  const start = editor.selectionStart;
  const end   = editor.selectionEnd;
  const sel   = editor.value.slice(start, end);
  const block = '\n```\n' + (sel || 'code here') + '\n```\n';
  editor.setRangeText(block, start, end, 'end');
  editor.focus();
  onEdit();
}

function insertLink() {
  const start = editor.selectionStart;
  const end   = editor.selectionEnd;
  const sel   = editor.value.slice(start, end) || 'link text';
  const md    = `[${sel}](url)`;
  editor.setRangeText(md, start, end, 'select');
  editor.focus();
  onEdit();
}

function insertImage() {
  const start = editor.selectionStart;
  const md    = '![alt text](image-url)';
  editor.setRangeText(md, start, start, 'end');
  editor.focus();
  onEdit();
}

function insertTable() {
  const start = editor.selectionStart;
  const tbl   = '\n| Column 1 | Column 2 | Column 3 |\n| --- | --- | --- |\n| Row 1 | Data | Data |\n| Row 2 | Data | Data |\n';
  editor.setRangeText(tbl, start, start, 'end');
  editor.focus();
  onEdit();
}

// Tab key support
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    editor.setRangeText('  ', start, start, 'end');
    onEdit();
  }
  // Ctrl/Cmd shortcuts
  if ((e.ctrlKey || e.metaKey)) {
    if (e.key === 'b') { e.preventDefault(); wrap('**','**'); }
    if (e.key === 'i') { e.preventDefault(); wrap('*','*'); }
    if (e.key === 'k') { e.preventDefault(); insertLink(); }
    if (e.key === 's') { e.preventDefault(); downloadMd(); }
  }
});

// ── MARKDOWN PARSER ───────────────────────────────────────
// Full-featured parser: headings, bold, italic, strikethrough, code blocks,
// inline code, links, images, tables, task lists, blockquotes, HR, footnotes

function parseMarkdown(src) {
  if (!src.trim()) return '';
  let html = src;

  // Normalise line endings
  html = html.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  // ── FENCED CODE BLOCKS (process first to protect content) ──
  const codeBlocks = [];
  html = html.replace(/```([^\n]*)\n([\s\S]*?)```/gm, (_, lang, code) => {
    const highlighted = highlightCode(escHtml(code.replace(/\n$/,'')), lang.trim());
    const ph = `\x00CODE${codeBlocks.length}\x00`;
    codeBlocks.push(`<pre><code class="lang-${escHtml(lang.trim())}">${highlighted}</code></pre>`);
    return ph;
  });

  // Indented code blocks (4 spaces)
  html = html.replace(/((?:^(?: {4}|\t)[^\n]*\n?)+)/gm, match => {
    const code = match.replace(/^ {4}/gm,'').replace(/^\t/gm,'');
    const ph = `\x00CODE${codeBlocks.length}\x00`;
    codeBlocks.push(`<pre><code>${escHtml(code.trim())}</code></pre>`);
    return ph;
  });

  // ── TABLES ──
  html = html.replace(/^(\|.+\|\n)((?:\|[-: ]+)+\|\n)((?:\|.+\|\n?)+)/gm, (_, header, sep, body) => {
    const cols = sep.split('|').filter(c=>c.trim()).map(c => {
      const t = c.trim();
      if (t.startsWith(':') && t.endsWith(':')) return 'center';
      if (t.endsWith(':')) return 'right';
      return 'left';
    });
    const hCells = header.split('|').filter(c=>c.trim()).map((c,i) =>
      `<th style="text-align:${cols[i]||'left'}">${inlineMarkdown(c.trim())}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c=>c.trim()).map((c,i) =>
        `<td style="text-align:${cols[i]||'left'}">${inlineMarkdown(c.trim())}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${hCells}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // ── BLOCKQUOTES ──
  html = html.replace(/^(>[^\n]*(\n>?[^\n]*)*)/gm, match => {
    const inner = match.replace(/^> ?/gm, '');
    return `<blockquote>${parseMarkdown(inner)}</blockquote>`;
  });

  // ── HEADINGS ──
  html = html.replace(/^(#{1,6})\s+(.+)$/gm, (_, hashes, text) => {
    const level = hashes.length;
    const id    = text.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-');
    return `<h${level} id="${id}">${inlineMarkdown(text)}</h${level}>`;
  });

  // ── HORIZONTAL RULE ──
  html = html.replace(/^(?:---|-{3,}|\*{3,}|_{3,})$/gm, '<hr/>');

  // ── TASK LISTS (before regular lists) ──
  // handled inside list processing

  // ── UNORDERED LISTS ──
  html = processLists(html);

  // ── PARAGRAPHS ──
  // Split on blank lines
  const blocks = html.split(/\n{2,}/);
  html = blocks.map(block => {
    block = block.trim();
    if (!block) return '';
    // Don't wrap blocks that are already HTML tags or code placeholders
    if (/^\x00CODE/.test(block)) return block;
    if (/^<(h[1-6]|ul|ol|li|blockquote|table|pre|hr|p)/.test(block)) return block;
    // Wrap in paragraph
    return `<p>${inlineMarkdown(block)}</p>`;
  }).join('\n');

  // ── RESTORE CODE BLOCKS ──
  codeBlocks.forEach((cb, i) => {
    html = html.replace(`\x00CODE${i}\x00`, cb);
  });

  return html;
}

function processLists(html) {
  // Process ordered lists
  html = html.replace(/((?:^\d+\.\s+.+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(line => {
      const text = line.replace(/^\d+\.\s+/, '');
      return `<li>${inlineMarkdown(text)}</li>`;
    }).join('');
    return `<ol>${items}</ol>`;
  });
  // Process unordered + task lists
  html = html.replace(/((?:^[-*+]\s+.+\n?)+)/gm, match => {
    const items = match.trim().split('\n').map(line => {
      let text = line.replace(/^[-*+]\s+/, '');
      // Task list
      if (text.startsWith('[ ] '))  return `<li style="list-style:none"><input type="checkbox" disabled> ${inlineMarkdown(text.slice(4))}</li>`;
      if (text.startsWith('[x] ') || text.startsWith('[X] '))
        return `<li style="list-style:none"><input type="checkbox" disabled checked> <del>${inlineMarkdown(text.slice(4))}</del></li>`;
      return `<li>${inlineMarkdown(text)}</li>`;
    }).join('');
    return `<ul>${items}</ul>`;
  });
  return html;
}

function inlineMarkdown(text) {
  if (!text) return '';
  // Images before links
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) =>
    `<img src="${escAttr(src)}" alt="${escAttr(alt)}">`);
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) =>
    `<a href="${escAttr(href)}" target="_blank" rel="noopener">${label}</a>`);
  // Auto-links
  text = text.replace(/(?<![="'])https?:\/\/[^\s<>"']+/g, url =>
    `<a href="${escAttr(url)}" target="_blank" rel="noopener">${escHtml(url)}</a>`);
  // Bold+italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/___(.+?)___/g,        '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g,      '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*([^*\n]+)\*/g,  '<em>$1</em>');
  text = text.replace(/_([^_\n]+)_/g,    '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Highlight
  text = text.replace(/==(.+?)==/g, '<mark>$1</mark>');
  // Inline code (protect from further processing)
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
  // Line breaks: two spaces at end of line
  text = text.replace(/  \n/g, '<br>');
  return text;
}

// ── SIMPLE SYNTAX HIGHLIGHTER ──────────────────────────────
function highlightCode(code, lang) {
  if (!lang) return code;
  const L = lang.toLowerCase();
  if (['js','javascript','ts','typescript','jsx','tsx'].includes(L)) {
    return code
      .replace(/\/\/[^\n]*/g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/\/\*[\s\S]*?\*\//g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g,
               m => `<span class="tok-str">${m}</span>`)
      .replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|default|from|async|await|new|this|typeof|instanceof|of|in|try|catch|throw|null|undefined|true|false)\b/g,
               m => `<span class="tok-kw">${m}</span>`)
      .replace(/\b(\d+\.?\d*)\b/g, m => `<span class="tok-num">${m}</span>`)
      .replace(/\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=\()/g, m => `<span class="tok-fn">${m}</span>`);
  }
  if (['py','python'].includes(L)) {
    return code
      .replace(/#[^\n]*/g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|"""[\s\S]*?"""|'''[\s\S]*?''')/g,
               m => `<span class="tok-str">${m}</span>`)
      .replace(/\b(def|class|import|from|return|if|elif|else|for|while|in|not|and|or|True|False|None|try|except|with|as|lambda|pass|break|continue|raise|yield|async|await)\b/g,
               m => `<span class="tok-kw">${m}</span>`)
      .replace(/\b(\d+\.?\d*)\b/g, m => `<span class="tok-num">${m}</span>`);
  }
  if (['html','xml'].includes(L)) {
    return code
      .replace(/(&lt;!--[\s\S]*?--&gt;)/g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/(&lt;\/?[a-zA-Z][a-zA-Z0-9-]*)/g, m => `<span class="tok-kw">${m}</span>`)
      .replace(/([a-zA-Z-]+=)("(?:[^"\\]|\\.)*")/g,
               (_, a, v) => `<span class="tok-fn">${a}</span><span class="tok-str">${v}</span>`);
  }
  if (['css','scss'].includes(L)) {
    return code
      .replace(/\/\*[\s\S]*?\*\//g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/("[^"]*"|'[^']*')/g, m => `<span class="tok-str">${m}</span>`)
      .replace(/([@#.][a-zA-Z][a-zA-Z0-9_-]*|:[a-zA-Z-]+)/g, m => `<span class="tok-kw">${m}</span>`)
      .replace(/(-?\d+\.?\d*(?:px|em|rem|%|vh|vw|s|ms)?)/g, m => `<span class="tok-num">${m}</span>`);
  }
  if (['bash','sh','shell'].includes(L)) {
    return code
      .replace(/#[^\n]*/g, m => `<span class="tok-comment">${m}</span>`)
      .replace(/("[^"]*"|'[^']*')/g, m => `<span class="tok-str">${m}</span>`)
      .replace(/\b(echo|cd|ls|mkdir|rm|cp|mv|cat|grep|find|chmod|sudo|export|source|if|then|else|fi|for|do|done|while|case|esac|function)\b/g,
               m => `<span class="tok-kw">${m}</span>`);
  }
  return code;
}

// ── ON EDIT ───────────────────────────────────────────────
function onEdit() {
  renderPreview();
  updateWordCount();
  saveDoc();
}

function renderPreview() {
  const src = editor.value;
  $('mdBody').innerHTML = parseMarkdown(src);
}

function updateWordCount() {
  const text = editor.value.replace(/```[\s\S]*?```/g,'').replace(/[#*`_~\[\]()!]/g,'').trim();
  const words = text ? text.split(/\s+/).length : 0;
  const lines = editor.value.split('\n').length;
  const chars = editor.value.length;
  $('wordCount').textContent = `${words} words · ${lines} lines · ${chars} chars`;
}

// ── EXPORT ────────────────────────────────────────────────
function copyMd() {
  navigator.clipboard.writeText(editor.value)
    .then(() => showToast('✓ Markdown copied'))
    .catch(() => fallbackCopy(editor.value, 'Markdown copied'));
}

function copyHtml() {
  const html = parseMarkdown(editor.value);
  navigator.clipboard.writeText(html)
    .then(() => showToast('✓ HTML copied'))
    .catch(() => fallbackCopy(html, 'HTML copied'));
}

function downloadMd() {
  const title = ($('docTitle').value || 'document').replace(/[^a-z0-9\-_\s]/gi,'').trim().replace(/\s+/g,'-') || 'document';
  const blob  = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href = url; a.download = title + '.md';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✓ Downloaded ' + title + '.md');
}

function downloadPDF() {
  // Switch to preview-only mode for clean print then restore
  const was = view;
  setView('preview');
  setTimeout(() => {
    window.print();
    setTimeout(() => setView(was), 300);
  }, 120);
}

function fallbackCopy(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  showToast('✓ ' + msg);
}

// ── UTILS ─────────────────────────────────────────────────
function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s)  { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showToast(msg) {
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
